<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A visual simulator for consistent hashing load balancing. Assign users to nodes using a simple hash function." />
  <title>Consistent Hashing Load Balancer Simulator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <header class="header" id="header">
    <div class="header-glow"></div>
    <h1 style="display: flex; justify-content: center; align-items: center; gap: 12px;">
      <i data-lucide="zap" width="32" height="32"></i> Consistent Hashing Simulator
    </h1>
    <p class="subtitle">Visualize how load balancers distribute traffic across nodes</p>
  </header>

  <main id="main-layout">

    <div class="top-row">

      <section class="controls-col" id="controls-panel">
        <div class="glass-card" id="input-card">
          <h2 class="card-title" style="display: flex; align-items: center; gap: 8px;"><i data-lucide="radio" width="20" height="20"></i> Send Request</h2>
          <div class="input-group">
            <label for="username-input">Enter Username</label>
            <input
              type="text"
              id="username-input"
              placeholder="e.g. Rahul, Alice, Bob..."
              autocomplete="off"
            />
          </div>
          <button class="btn btn-primary" id="send-btn">
            <i data-lucide="send" width="18" height="18"></i> Send Request
          </button>
        </div>

        <div class="glass-card" id="management-card">
          <h2 class="card-title" style="display: flex; align-items: center; gap: 8px;"><i data-lucide="wrench" width="20" height="20"></i> Manage Nodes</h2>
          <div class="input-group">
            <label for="node-name-input">Custom Name (Optional)</label>
            <input
              type="text"
              id="node-name-input"
              placeholder="e.g. server-alpha"
              autocomplete="off"
            />
          </div>
          <div class="btn-row">
            <button class="btn btn-add" id="add-node-btn"><i data-lucide="plus" width="18" height="18"></i> Add Node</button>
            <button class="btn btn-remove" id="remove-node-btn"><i data-lucide="minus" width="18" height="18"></i> Remove Node</button>
          </div>
          <button class="btn btn-reset" id="reset-btn"><i data-lucide="rotate-ccw" width="18" height="18"></i> Reset All</button>
        </div>
      </section>

      <section class="terminal-col">
        <div class="terminal-window" id="log-card">
          <div class="terminal-header">
            <div class="terminal-dots">
              <span class="dot dot-red"></span>
              <span class="dot dot-yellow"></span>
              <span class="dot dot-green"></span>
            </div>
            <span class="terminal-title">SIMULATOR_LOGS_STDOUT</span>
            <span class="terminal-clear" id="clear-logs-btn" title="Clear logs"><i data-lucide="trash-2" width="14" height="14"></i></span>
          </div>
          <div id="result-message" class="result-message"></div>
          <div id="steps-container" class="terminal-body">
            <p class="terminal-placeholder">&gt;&gt; Awaiting simulator input...</p>
          </div>
        </div>
      </section>

    </div>

    <section class="nodes-section" id="nodes-panel">
      <h2 class="section-title" style="display: flex; align-items: center; gap: 8px;"><i data-lucide="server" width="24" height="24"></i> Node Cluster</h2>
      <div id="nodes-container" class="nodes-container">
      </div>
    </section>

  </main>

  <script src="script.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
